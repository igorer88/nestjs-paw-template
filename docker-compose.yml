services:
  user-service:
    restart: unless-stopped
    container_name: user-service
    # image: ghcr.io/your-username/your-repo:your-tag  # Image from GitHub Container Registry
    image: user-service:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 23-alpine
        PNPM_REGISTRY: 'https://registry.npmjs.org/'
      target: ${BUILD_STAGE}
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - net
    depends_on:
      - database
    # entrypoint: ["sh", "-c", "infisical run"]

  database:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: r00t
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    healthcheck:
      test: 'pg_isready --username=${DB_USER} --dbname=${DB_NAME} && psql --username=${DB_USER} --dbname=${DB_NAME} --list'
      interval: 5s
      timeout: 10s
      retries: 10
    volumes:
      - ./db/pg_data:/var/lib/postgresql/data
      - ./db/pg_dataset:/docker-entrypoint-initdb.d
    networks:
      - net

  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
  #   ports:
  #     - '${PGADMIN_PORT:-5050}:80'
  #   depends_on:
  #     - database
  #   networks:
  #     - net

volumes:
  db:

networks:
  net:
